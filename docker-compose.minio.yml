version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: opencode-minio
    ports:
      - "9000:9000"      # API port
      - "9001:9001"      # Console port
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_REGION: us-east-1
      MINIO_STORAGE_USE_HTTPS: "off"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - opencode-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s

networks:
  opencode-network:
    driver: bridge

volumes:
  minio_data:
    driver: local
