# OpenCode PoC - Production Configuration

[server]
host = "0.0.0.0"
port = 8080
workers = 8

[database]
path = "/data/opencode.db"
auto_init = true
max_connections = 20

[upload]
directory = "/data/uploads"
max_file_size_mb = 100

[logging]
level = "info"
format = "json"

[auth]
jwt_secret = "OVERRIDE_WITH_JWT_SECRET_ENV_VAR"
token_expiry_hours = 24

[cors]
allowed_origins = ["*"]
