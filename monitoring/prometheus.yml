global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'opencode-api'

scrape_configs:
  - job_name: 'opencode-api'
    static_configs:
      - targets: ['opencode-api:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s
    honor_labels: true

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"
