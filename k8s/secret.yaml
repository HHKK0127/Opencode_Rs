# IMPORTANT: Do NOT commit real secrets to this file.
# In production, use:
#   kubectl create secret generic opencode-secrets \
#     --from-literal=jwt-secret="<your-secret>" \
#     --from-literal=redis-password="<your-password>" \
#     -n opencode
#
# Or use an external secrets manager (Vault, AWS Secrets Manager, etc.)
# and reference via ExternalSecret / SecretProviderClass.
#
# This file contains placeholder values for local/dev cluster only.
apiVersion: v1
kind: Secret
metadata:
  name: opencode-secrets
  namespace: opencode
type: Opaque
stringData:
  jwt-secret: "dev-local-jwt-secret-min-32-chars-ok"
  redis-password: "redis-dev-password"
  postgres-password: "opencode-dev-password"
  database-url: "postgres://opencode:opencode-dev-password@postgres:5432/opencode"
