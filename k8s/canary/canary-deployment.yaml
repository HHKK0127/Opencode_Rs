# Canary Deployment — runs alongside the stable deployment.
#
# Traffic split is controlled by replica ratio:
#   stable:  9 replicas  → ~90% traffic
#   canary:  1 replica   → ~10% traffic
#
# Both deployments share the same Service selector (app: opencode-api).
# To promote: increase canary replicas, decrease stable replicas.
# To rollback: set canary replicas to 0.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencode-api-canary
  namespace: opencode
  labels:
    app: opencode-api
    track: canary
  annotations:
    deployment.kubernetes.io/revision: "1"
    canary.release/phase: "10"         # current traffic % label for tooling
spec:
  replicas: 1                          # 1 of 10 total → 10% traffic
  selector:
    matchLabels:
      app: opencode-api
      track: canary
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: opencode-api              # matches the Service selector → receives traffic
        track: canary
        version: "canary"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: opencode-api
          image: opencode_poc:canary   # built from the feature branch
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: opencode-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: opencode-secrets
                  key: jwt-secret
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opencode-secrets
                  key: redis-password
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: opencode-secrets
                  key: database-url
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health/live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: opencode-data-pvc
