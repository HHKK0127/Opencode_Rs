global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: production
    service: opencode

rule_files:
  - "prometheus-rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # OpenCode API metrics
  - job_name: opencode-api
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s
    static_configs:
      - targets: ["opencode-api:8080"]

  # Canary pod metrics (separate job for comparison)
  - job_name: opencode-canary
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["opencode-api-canary:8080"]

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
